name: guvenli_sehrim
description: "Güvenli Şehrim - Türkiye vatandaşları için çevre güvenliği uygulaması."
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  dio: ^5.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  flutter_local_notifications: ^17.1.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  google_fonts: ^8.0.2
  animations: ^2.1.2
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
